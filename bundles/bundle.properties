## Logic Category
# Reinforced Microprocessor
block.erekir-mods-processor-micro-reinforced.name = Reinforced Microprocessor
block.erekir-mods-processor-micro-reinforced.description = Executes a sequence of logical instructions in a loop. Can be used to control units and structures.
block.erekir-mods-processor-micro-reinforced.details = Reinforced to endure Erekir's harsh operational conditions, it offers capabilities comparable to Serpulo's standard microprocessor. Its durable architecture ensures greater stability and reliability in hostile industrial environments.
---
# Reinforced Logic Processor
block.erekir-mods-processor-logic-reinforced.name = Reinforced Logic Processor
block.erekir-mods-processor-logic-reinforced.description = Executes a sequence of logical instructions in a loop. Can be used to control units and structures. Faster than a microprocessor.
block.erekir-mods-processor-logic-reinforced.details = Designed for advanced industrial automation, the Reinforced Logic Processor provides superior processing speed and operational efficiency compared to the reinforced microprocessor. Its hardened architecture enables stable execution of complex control systems under Erekir's extreme environmental conditions.
---
# Hyper Reinforced Processor
block.erekir-mods-processor-hyper-reinforced.name = Hyper Reinforced Processor
block.erekir-mods-processor-hyper-reinforced.description = Executes a sequence of logical instructions in a loop. Can be used to control units and structures. Faster than a logic processor.
block.erekir-mods-processor-hyper-reinforced.details = The pinnacle of reinforced computational technology for Erekir environments. Engineered for ultra-fast logical operations and large-scale automation networks, it maintains exceptional performance and reliability even in the most demanding industrial sectors.
---
# Reinforced Message
block.erekir-mods-message-reinforced.name = Reinforced Message
block.erekir-mods-message-reinforced.description = Displays a message. Used for communication between allies or as reminders.
block.erekir-mods-message-reinforced.details = A reinforced communication tool designed for displaying technical information, schematic annotations, resource monitoring, and operational records. Its durable construction ensures reliable information transmission in hostile industrial environments.
---
# Reinforced Switch
block.erekir-mods-switch-reinforced.name = Reinforced Switch
block.erekir-mods-switch-reinforced.description = A toggle lever. Its state can be read and controlled by logic processors.
block.erekir-mods-switch-reinforced.details = Commonly used in logic-controlled automation systems, allowing processors to read and manipulate operational states efficiently. Its reinforced construction ensures dependable functionality in demanding industrial infrastructures.
---
# Reinforced Display
block.erekir-mods-display-logic-reinforced.name = Reinforced Display
block.erekir-mods-display-logic-reinforced.description = Displays arbitrary graphics generated by a logic processor.
block.erekir-mods-display-logic-reinforced.details = Its reinforced graphical interface enables the visualization of graphics and data generated by logic processors. Essential for real-time monitoring, diagnostics, and industrial system management across Erekir facilities.
---
# Large Reinforced Display
block.erekir-mods-display-large-reinforced.name = Large Reinforced Display
block.erekir-mods-display-large-reinforced.description = Displays arbitrary graphics generated by a logic processor on a large scale.
block.erekir-mods-display-large-reinforced.details = A large-scale reinforced visualization interface designed for advanced monitoring systems and industrial command networks. Its expanded display area improves readability and operational oversight in complex automated infrastructures.
---
# Reinforced Memory Cell
block.erekir-mods-cell-memory-reinforced.name = Reinforced Memory Cell
block.erekir-mods-cell-memory-reinforced.description = Stores information for a logic processor.
block.erekir-mods-cell-memory-reinforced.details = An essential storage component for logic processors, capable of retaining temporary operational data and processing variables. Its reinforced structure ensures stable data retention in hostile industrial environments.
---
# Reinforced Memory Bank
block.erekir-mods-bank-memory-reinforced.name = Reinforced Memory Bank
block.erekir-mods-bank-memory-reinforced.description = Stores information for a logic processor. High capacity.
block.erekir-mods-bank-memory-reinforced.details = A high-capacity data storage solution engineered for advanced logic systems. Designed to manage large volumes of operational data efficiently, it supports complex automation networks and industrial-scale computational processes on Erekir.
