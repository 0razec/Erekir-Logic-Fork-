## Logic Category

# Reinforced Microprocessor
block.erekir-mods-processor-micro-reinforced.name = 강화 마이크로 프로세서
block.erekir-mods-processor-micro-reinforced.description = 논리 명령어를 반복적으로 실행합니다. 유닛과 구조물을 제어하는 데 사용할 수 있습니다.
block.erekir-mods-processor-micro-reinforced.details = 에레키르의 혹독한 운용 환경을 견딜 수 있도록 강화되었으며, 세르풀로의 기본 마이크로 프로세서와 유사한 성능을 제공합니다. 견고한 구조 덕분에 적대적인 산업 환경에서도 높은 안정성과 신뢰성을 유지합니다.

---

# Reinforced Logic Processor
block.erekir-mods-processor-logic-reinforced.name = 강화 논리 프로세서
block.erekir-mods-processor-logic-reinforced.description = 논리 명령어를 반복적으로 실행합니다. 유닛과 구조물을 제어하는 데 사용할 수 있습니다. 마이크로 프로세서보다 더 빠릅니다.
block.erekir-mods-processor-logic-reinforced.details = 고급 산업 자동화를 위해 설계된 강화 논리 프로세서는 강화 마이크로 프로세서보다 뛰어난 처리 속도와 운영 효율을 제공합니다. 강화된 구조는 에레키르의 극한 환경에서도 복잡한 제어 시스템을 안정적으로 실행할 수 있도록 지원합니다.

---

# Hyper Reinforced Processor
block.erekir-mods-processor-hyper-reinforced.name = 초강화 프로세서
block.erekir-mods-processor-hyper-reinforced.description = 논리 명령어를 반복적으로 실행합니다. 유닛과 구조물을 제어하는 데 사용할 수 있습니다. 논리 프로세서보다 더 빠릅니다.
block.erekir-mods-processor-hyper-reinforced.details = 에레키르 환경을 위한 강화 연산 기술의 정점입니다. 초고속 논리 연산과 대규모 자동화 네트워크를 위해 설계되었으며, 가장 혹독한 산업 구역에서도 뛰어난 성능과 안정성을 유지합니다.

---

# Reinforced Message
block.erekir-mods-message-reinforced.name = 강화 메시지
block.erekir-mods-message-reinforced.description = 메시지를 표시합니다. 동맹 간의 통신이나 알림 용도로 사용됩니다.
block.erekir-mods-message-reinforced.details = 기술 정보, 설계 메모, 자원 모니터링 및 운영 기록을 표시하기 위해 설계된 강화 통신 장치입니다. 견고한 구조 덕분에 적대적인 산업 환경에서도 안정적인 정보 전달이 가능합니다.

---

# Reinforced Switch
block.erekir-mods-switch-reinforced.name = 강화 스위치
block.erekir-mods-switch-reinforced.description = 토글식 스위치입니다. 상태를 논리 프로세서가 읽고 제어할 수 있습니다.
block.erekir-mods-switch-reinforced.details = 논리 기반 자동화 시스템에서 널리 사용되며, 프로세서가 운영 상태를 효율적으로 읽고 제어할 수 있도록 지원합니다. 강화된 구조는 까다로운 산업 인프라에서도 안정적인 작동을 보장합니다.

---

# Reinforced Display
block.erekir-mods-display-logic-reinforced.name = 강화 디스플레이
block.erekir-mods-display-logic-reinforced.description = 논리 프로세서가 생성한 그래픽을 표시합니다.
block.erekir-mods-display-logic-reinforced.details = 강화된 그래픽 인터페이스를 통해 논리 프로세서가 생성한 그래픽과 데이터를 시각화할 수 있습니다. 에레키르 시설 전반의 실시간 모니터링, 진단 및 산업 시스템 관리에 필수적입니다.

---

# Large Reinforced Display
block.erekir-mods-display-large-reinforced.name = 대형 강화 디스플레이
block.erekir-mods-display-large-reinforced.description = 논리 프로세서가 생성한 그래픽을 대규모로 표시합니다.
block.erekir-mods-display-large-reinforced.details = 고급 모니터링 시스템과 산업 지휘 네트워크를 위해 설계된 대형 강화 시각화 인터페이스입니다. 확장된 화면은 복잡한 자동화 인프라에서 가독성과 운영 감시 능력을 향상시킵니다.

---

# Reinforced Memory Cell
block.erekir-mods-cell-memory-reinforced.name = 강화 메모리 셀
block.erekir-mods-cell-memory-reinforced.description = 논리 프로세서를 위한 정보를 저장합니다.
block.erekir-mods-cell-memory-reinforced.details = 논리 프로세서를 위한 필수 저장 장치로, 임시 운영 데이터와 처리 변수를 저장할 수 있습니다. 강화된 구조는 적대적인 산업 환경에서도 안정적인 데이터 보존을 보장합니다.

---

# Reinforced Memory Bank
block.erekir-mods-bank-memory-reinforced.name = 강화 메모리 뱅크
block.erekir-mods-bank-memory-reinforced.description = 논리 프로세서를 위한 정보를 저장합니다. 높은 용량.
block.erekir-mods-bank-memory-reinforced.details = 고급 논리 시스템을 위해 설계된 고용량 데이터 저장 장치입니다. 대규모 운영 데이터를 효율적으로 처리할 수 있도록 개발되었으며, 에레키르의 복잡한 자동화 네트워크와 산업 규모 연산 시스템을 지원합니다.
